<body>
<div id="root"></div>
<div class="toast" id="toast"></div>
<script type="text/babel">
const {useState,useEffect,useCallback}=React;
const toMMSS=s=>{const m=Math.floor(s/60);return `${m}:${String(s%60).padStart(2,'0')}`;};
const MAX_DUR=180;
const ENERGY_COLORS=['','#1e3a5f','#1e3a5f','#b45309','#7c3aed','#dc2626'];

const getAllSub=data=>{
  const m={};
  Object.values(data.sub_instruksi||{}).flat().forEach(x=>{m[x.id]=x;});
  return m;
};

const showToast=(msg,type='info',dur=2500)=>{
  const el=document.getElementById('toast');if(!el)return;
  el.textContent=msg;el.className=`toast ${type} show`;
  clearTimeout(el._t);el._t=setTimeout(()=>{el.className='toast';},dur);
};

const copyText=async(text,label)=>{
  if(!text){showToast('Tidak ada konten','error');return;}
  try{
    if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(text);}
    else{
      const ta=document.createElement('textarea');ta.value=text;
      ta.style.cssText='position:fixed;left:-9999px;top:-9999px;opacity:0;';
      document.body.appendChild(ta);ta.focus();ta.select();
      const ok=document.execCommand('copy');document.body.removeChild(ta);
      if(!ok)throw new Error();
    }
    showToast(`✓ ${label} tersalin!`,'success');
  }catch(e){showToast('Gagal menyalin','error',4000);}
};

const sbFetch=async(table,params='')=>{
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`,{
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
  });
  if(!res.ok)throw new Error(`${res.status}`);
  return res.json();
};
const sbInsert=async(table,data)=>{
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'return=representation'},
    body:JSON.stringify(data)
  });
  if(!res.ok){const e=await res.text();throw new Error(e);}
  return res.json();
};
const sbDelete=async(table,id)=>{
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`,{
    method:'DELETE',
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
  });
  if(!res.ok)throw new Error(`${res.status}`);
};

const getLockedSubs=(activeSubs,conflictRules)=>{
  const locked=new Set();
  if(!conflictRules)return locked;
  conflictRules.forEach(rule=>{
    if(activeSubs.includes(rule.trigger)&&rule.locks){
      rule.locks.forEach(l=>locked.add(l));
    }
  });
  return locked;
};

const getConflictMsgs=(activeSubs,sectionId,conflictRules)=>{
  const msgs=[];
  if(!conflictRules)return msgs;
  conflictRules.forEach(rule=>{
    if(!activeSubs.includes(rule.trigger))return;
    if(rule.locks){const hasConflict=rule.locks.some(l=>activeSubs.includes(l));if(hasConflict)msgs.push(rule.msg);}
    if(rule.warn_sections&&rule.warn_sections.includes(sectionId))msgs.push(rule.msg);
    if(rule.warn_with){const hasWarn=rule.warn_with.some(w=>activeSubs.includes(w));if(hasWarn)msgs.push(rule.msg);}
  });
  return[...new Set(msgs)];
};

const hasLokalInstrumen=(piranti)=>{
  const lokalIds=['kendangjawa','kendangbali','kendangsunda','suling','sulingbali','kecapi','sasando','saron','bonang','gongageng','cengceng','rebana','talempong','kolintang','sampek','tifa'];
  return piranti.some(p=>lokalIds.includes(p));
};

const getCompat=(D,genreId)=>D?.kompatibilitas?.[genreId]||null;

/* ── Smart Narrative Builder ── */
const buildNarrative=(D,sel,mode)=>{
  if(!D)return'';
  const find=(cat,id)=>(D[cat]||[]).find(x=>x.id===id);
  const genres=sel.ragam.map(id=>find('ragam',id)?.label).filter(Boolean);
  const moods=sel.rasa.map(id=>find('rasa',id)?.label).filter(Boolean);
  const vocals=mode==='instrumental'?['instrumental, no vocals']:sel.swara.map(id=>find('swara',id)?.label).filter(Boolean);
  const tempo=sel.wirama.length?find('wirama',sel.wirama[0]):null;
  const instrs=sel.piranti.map(id=>find('piranti',id)?.label).filter(Boolean);
  const prods=sel.produksi.map(id=>find('produksi',id)?.label).filter(Boolean);
  const scales=sel.tangga_nada?.map(id=>find('tangga_nada',id)?.label).filter(Boolean)||[];

  const parts=[];
  if(genres.length)parts.push(genres.join(', '));
  if(tempo)parts.push(tempo.bpm||tempo.label);
  if(scales.length)parts.push(`${scales.join('/')} scale`);
  if(moods.length){
    const moodAdj=moods.map(m=>m.toLowerCase()).join(', ');
    parts.push(`${moodAdj} atmosphere`);
  }
  if(instrs.length)parts.push(instrs.join(', '));
  if(vocals.length&&mode!=='instrumental')parts.push(vocals.join(', '));
  if(prods.length)parts.push(prods.join(', ').toLowerCase()+' production');

  return parts.join(', ');
};

/* ══ APP ══ */
function App(){
  const [D,setD]=useState(null);
  const [mode,setMode]=useState('vocal');
  const [curatedOn,setCuratedOn]=useState(true);
  const [leftTab,setLeftTab]=useState('style');
  const [outTab,setOutTab]=useState('output');
  const [presetTab,setPresetTab]=useState('saya');
  const [sel,setSel]=useState({ragam:[],rasa:[],swara:[],wirama:[],piranti:[],produksi:[],tangga_nada:[]});
  const [timeline,setTimeline]=useState([]);
  const [presets,setPresets]=useState([]);
  const [referensi,setReferensi]=useState([]);
  const [refFilter,setRefFilter]=useState('Semua');
  const [refLoading,setRefLoading]=useState(false);
  const [expandedRef,setExpandedRef]=useState(null);
  const [saveModal,setSaveModal]=useState(false);
  const [saveName,setSaveName]=useState('');
  const [saveCat,setSaveCat]=useState('');
  const [exportModal,setExportModal]=useState(null);
  const [tplModal,setTplModal]=useState(false);
  const [templates,setTemplates]=useState([]);
  const [tplFilter,setTplFilter]=useState('Semua');
  const [tplLoading,setTplLoading]=useState(false);

  useEffect(()=>{
    fetch('ukoro-data.json').then(r=>r.json()).then(d=>{setD(d);setSaveCat(d.kategori_preset[0]);})
      .catch(()=>showToast('Gagal memuat kamus','error'));
    sbFetch('preset_gawe_ukoro','order=created_at.desc')
      .then(data=>setPresets(Array.isArray(data)?data:[]))
      .catch(()=>showToast('Mode offline','info'));
  },[]);

  const loadReferensi=useCallback(()=>{
    setRefLoading(true);
    sbFetch('preset_referensi','aktif=eq.true&order=id.asc')
      .then(data=>{setReferensi(Array.isArray(data)?data:[]);setRefLoading(false);})
      .catch(()=>{showToast('Gagal memuat referensi','error');setRefLoading(false);});
  },[]);

  const loadTemplates=useCallback(()=>{
    if(templates.length>0)return;
    setTplLoading(true);
    sbFetch('template_racik','aktif=eq.true&order=nilai_jual.desc')
      .then(data=>{setTemplates(Array.isArray(data)?data:[]);setTplLoading(false);})
      .catch(()=>{showToast('Gagal memuat template','error');setTplLoading(false);});
  },[templates.length]);

  useEffect(()=>{
    if(outTab==='presets'&&presetTab==='referensi'&&referensi.length===0)loadReferensi();
  },[outTab,presetTab]);

  /* apply template */
  const applyTemplate=useCallback((tpl)=>{
    try{
      const s=tpl.sel_data||{};
      setSel({
        ragam:s.ragam||[],rasa:s.rasa||[],swara:s.swara||[],
        wirama:s.wirama||[],piranti:s.piranti||[],
        produksi:s.produksi||[],tangga_nada:s.tangga_nada||[]
      });
      const tl=(tpl.timeline||[]).map((item,i)=>({
        ...item,
        uid:Date.now()+i+Math.random(),
        durasi_pilihan:item.durasi_pilihan||[10,15,20,30],
        durasi_min:item.durasi_min||5,
        durasi_max:item.durasi_max||40,
        durasi_warning:item.durasi_warning||'',
        energy_level:item.energy_level||3
      }));
      setTimeline(tl);
      setMode(tpl.mode||'vocal');
      setTplModal(false);
      setLeftTab('style');
      showToast(`✓ Template "${tpl.nama}" dimuat`,'success');
    }catch(e){showToast('Gagal load template','error');}
  },[]);

  /* genre toggle */
  const handleGenreToggle=useCallback((id)=>{
    setSel(p=>{
      const arr=p.ragam;
      const isRemoving=arr.includes(id);
      const newRagam=isRemoving?arr.filter(x=>x!==id):[...arr,id];
      if(!curatedOn||!D||isRemoving)return{...p,ragam:newRagam};
      const compat=D.kompatibilitas?.[id];
      if(!compat)return{...p,ragam:newRagam};
      const newSel={...p,ragam:newRagam};
      ['rasa','swara','piranti','produksi'].forEach(cat=>{
        const autoIds=compat[`auto_${cat}`]||[];
        const hideIds=compat[`hide_${cat}`]||[];
        const current=newSel[cat]||[];
        const filtered=current.filter(x=>!hideIds.includes(x));
        newSel[cat]=[...new Set([...filtered,...autoIds])];
      });
      return newSel;
    });
  },[D,curatedOn]);

  const toggle=(cat,id)=>{
    if(cat==='ragam'){handleGenreToggle(id);return;}
    setSel(p=>{
      const arr=p[cat]||[];
      if(cat==='wirama'||cat==='tangga_nada')return{...p,[cat]:arr.includes(id)?[]:[id]};
      return{...p,[cat]:arr.includes(id)?arr.filter(x=>x!==id):[...arr,id]};
    });
  };

  const activeGenre=sel.ragam[0]||null;
  const compat=getCompat(D,activeGenre);
  const totalDur=timeline.reduce((s,i)=>s+i.durasi,0);
  const durPct=Math.min((totalDur/MAX_DUR)*100,100);
  const durColor=totalDur>MAX_DUR?'#ef4444':totalDur>150?'#f59e0b':'#4ade80';
  const durClass=totalDur>MAX_DUR?'over':totalDur>150?'warn':'ok';
  const hasContent=!!(buildStyle()||buildStruct());

  function buildStyle(){
    if(!D)return'';
    const find=(cat,id)=>(D[cat]||[]).find(x=>x.id===id);
    const parts=[];
    if(sel.ragam.length)parts.push(sel.ragam.map(id=>find('ragam',id)?.label).filter(Boolean).join(', '));
    if(sel.rasa.length)parts.push(sel.rasa.map(id=>find('rasa',id)?.label).filter(Boolean).join(', '));
    if(sel.tangga_nada?.length){const sc=find('tangga_nada',sel.tangga_nada[0]);if(sc)parts.push(`${sc.label} scale`);}
    if(mode==='instrumental')parts.push('instrumental only, no vocals');
    else if(sel.swara.length)parts.push(sel.swara.map(id=>find('swara',id)?.label).filter(Boolean).join(', '));
    if(sel.wirama.length){const t=find('wirama',sel.wirama[0]);if(t)parts.push(t.bpm||t.label);}
    if(sel.piranti.length)parts.push(sel.piranti.map(id=>find('piranti',id)?.label).filter(Boolean).join(' + '));
    if(sel.produksi.length)parts.push(sel.produksi.map(id=>find('produksi',id)?.label).filter(Boolean).join(', '));
    return parts.join(', ');
  }

  function buildStruct(){
    if(!D||!timeline.length)return'';
    const subMap=getAllSub(D);
    let cursor=0;const lines=[];
    timeline.forEach(item=>{
      lines.push(`[${item.label} - ${toMMSS(cursor)}]`);
      item.activeSub.forEach(sid=>{if(subMap[sid])lines.push(subMap[sid].tag);});
      lines.push('');cursor+=item.durasi;
    });
    lines.push(`[End - ${toMMSS(cursor)}]`);
    return lines.join('\n');
  }

  const buildRefStruct=(struktur)=>{
    if(!struktur)return'';
    try{
      const arr=typeof struktur==='string'?JSON.parse(struktur):struktur;
      return arr.map(s=>{
        const ts=s.time||s.timestamp||'';
        const sec=s.section||s.label||'';
        const dyn=s.dynamics||s.dynamics_tag||'';
        const desc=s.description||'';
        const lines=[`[${ts}] [${sec}]${dyn?` [${dyn}]`:''}`];
        if(desc)lines.push(`[${desc}]`);
        lines.push('');
        return lines.join('\n');
      }).join('')+'[End]';
    }catch(e){return'';}
  };

  const addSection=sec=>{
    if(totalDur>=MAX_DUR){showToast('Total durasi sudah 3:00 menit','error');return;}
    const count=timeline.filter(x=>x.secId===sec.id).length;
    const label=count>0?`${sec.label} ${count+1}`:sec.label;
    setTimeline(p=>[...p,{
      uid:Date.now()+Math.random(),secId:sec.id,label,
      durasi:sec.durasi_default,durasi_pilihan:sec.durasi_pilihan,
      durasi_min:sec.durasi_min,durasi_max:sec.durasi_max,
      durasi_warning:sec.durasi_warning,
      energy_level:sec.energy_level||3,
      sub_tersedia:sec.sub_tersedia,activeSub:[...(sec.sub_default||[])]
    }]);
  };

  const moveItem=(idx,dir)=>setTimeline(p=>{
    const a=[...p];const to=idx+dir;
    if(to<0||to>=a.length)return a;
    [a[idx],a[to]]=[a[to],a[idx]];return a;
  });
  const delItem=uid=>setTimeline(p=>p.filter(x=>x.uid!==uid));
  const setDurasi=(uid,d)=>{
    const item=timeline.find(x=>x.uid===uid);if(!item)return;
    const diff=d-item.durasi;
    if(totalDur+diff>MAX_DUR){showToast('Batas 3:00 menit tercapai','error');return;}
    setTimeline(p=>p.map(x=>x.uid===uid?{...x,durasi:d}:x));
  };
  const setEnergyLevel=(uid,lvl)=>setTimeline(p=>p.map(x=>x.uid===uid?{...x,energy_level:lvl}:x));

  const toggleSub=(uid,sid,subMap,conflictRules)=>{
    const item=timeline.find(x=>x.uid===uid);if(!item)return;
    const isAdding=!item.activeSub.includes(sid);
    if(isAdding){
      const locked=getLockedSubs(item.activeSub,conflictRules);
      if(locked.has(sid)){showToast('Tag ini dikunci karena konflik','error');return;}
      const sub=subMap[sid];
      if(sub?.flag==='warn')showToast(`⚠️ ${sub.warn_msg||'Perhatikan kombinasi ini'}`,'warn',4000);
      if(sub?.flag==='red')showToast(`🔴 RED FLAG: ${sub.warn_msg||'Risiko tinggi'}`,'error',5000);
    }
    const msgs=isAdding?getConflictMsgs([...item.activeSub,sid],item.secId,conflictRules):[];
    msgs.forEach(m=>setTimeout(()=>showToast(`⚠️ ${m}`,'warn',4000),300));
    setTimeline(p=>p.map(x=>{
      if(x.uid!==uid)return x;
      const a=x.activeSub.includes(sid)?x.activeSub.filter(s=>s!==sid):[...x.activeSub,sid];
      return{...x,activeSub:a};
    }));
  };

  const doSave=async()=>{
    if(!saveName.trim()){showToast('Nama tidak boleh kosong','error');return;}
    const styleText=buildStyle();const structText=buildStruct();
    if(!styleText&&!structText){showToast('Tidak ada konten','error');return;}
    try{
      const data=await sbInsert('preset_gawe_ukoro',{
        nama:saveName.trim(),kategori:saveCat,mode,
        sel_data:sel,timeline,dibuat:new Date().toLocaleDateString('id-ID')
      });
      setPresets(p=>[data[0],...p]);
      setSaveModal(false);setSaveName('');
      showToast(`✓ "${saveName}" tersimpan`,'success');
      setOutTab('presets');setPresetTab('saya');
    }catch(e){showToast('Gagal simpan','error');}
  };

  const loadPreset=p=>{
    const s=p.sel_data||{};
    setSel({ragam:s.ragam||[],rasa:s.rasa||[],swara:s.swara||[],wirama:s.wirama||[],piranti:s.piranti||[],produksi:s.produksi||[],tangga_nada:s.tangga_nada||[]});
    setTimeline(p.timeline||[]);setMode(p.mode||'vocal');
    setOutTab('output');setLeftTab('style');
    showToast(`"${p.nama}" dimuat`,'info');
  };

  const delPreset=async(id,nama)=>{
    try{await sbDelete('preset_gawe_ukoro',id);setPresets(p=>p.filter(x=>x.id!==id));showToast(`"${nama}" dihapus`,'info');}
    catch(e){showToast('Gagal hapus','error');}
  };

  const buildExportText=(p)=>{
    if(!D)return'';
    const find=(cat,id)=>(D[cat]||[]).find(x=>x.id===id);
    const s=p.sel_data||{};const parts=[];
    if(s.ragam?.length)parts.push(s.ragam.map(id=>find('ragam',id)?.label).filter(Boolean).join(', '));
    if(s.rasa?.length)parts.push(s.rasa.map(id=>find('rasa',id)?.label).filter(Boolean).join(', '));
    if(s.tangga_nada?.length){const sc=find('tangga_nada',s.tangga_nada[0]);if(sc)parts.push(`${sc.label} scale`);}
    if(p.mode==='instrumental')parts.push('instrumental only, no vocals');
    else if(s.swara?.length)parts.push(s.swara.map(id=>find('swara',id)?.label).filter(Boolean).join(', '));
    if(s.wirama?.length){const t=find('wirama',s.wirama[0]);if(t)parts.push(t.bpm||t.label);}
    if(s.piranti?.length)parts.push(s.piranti.map(id=>find('piranti',id)?.label).filter(Boolean).join(' + '));
    if(s.produksi?.length)parts.push(s.produksi.map(id=>find('produksi',id)?.label).filter(Boolean).join(', '));
    const style=parts.join(', ');
    const subMap=getAllSub(D);let cursor=0;const lines=[];
    (p.timeline||[]).forEach(item=>{
      lines.push(`[${item.label} - ${toMMSS(cursor)}]`);
      item.activeSub?.forEach(sid=>{if(subMap[sid])lines.push(subMap[sid].tag);});
      lines.push('');cursor+=item.durasi;
    });
    if(lines.length)lines.push(`[End - ${toMMSS(cursor)}]`);
    return`PRESET: ${p.nama}\nKATEGORI: ${p.kategori}\nTANGGAL: ${p.dibuat}\n\n[STYLE PROMPT]\n${style}\n\n[STRUCTURE]\n${lines.join('\n')}`;
  };

  const exportAll=()=>{
    if(!presets.length){showToast('Tidak ada preset','error');return;}
    const lines=presets.map((p,i)=>`${'='.repeat(50)}\nPRESET #${String(i+1).padStart(2,'0')}\n${'='.repeat(50)}\n${buildExportText(p)}`).join('\n\n');
    try{
      const blob=new Blob([lines],{type:'text/plain'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download='ukoro-bundle.txt';a.click();
      URL.revokeObjectURL(url);
      showToast(`✓ ${presets.length} preset diekspor`,'success');
    }catch(e){showToast('Gagal ekspor','error');}
  };

  /* template filter */
  const tplCategories=['Semua',...[...new Set(templates.map(t=>t.kategori).filter(Boolean))]];
  const filteredTpl=tplFilter==='Semua'?templates:templates.filter(t=>t.kategori===tplFilter);
  const refCategories=['Semua',...[...new Set(referensi.map(r=>r.kategori_bundle).filter(Boolean))]];
  const filteredRef=refFilter==='Semua'?referensi:referensi.filter(r=>r.kategori_bundle===refFilter);

  const styleText=buildStyle();
  const structText=buildStruct();
  const isEmpty=!sel.ragam.length&&!sel.rasa.length&&!timeline.length;
  const hasLokal=hasLokalInstrumen(sel.piranti||[]);

  if(!D)return<div style={{color:'#555',padding:'40px',textAlign:'center',fontSize:'0.85rem'}}>Memuat data...</div>;

  const subMap=getAllSub(D);
  const conflictRules=D.conflict_rules||[];
  const curatedGenreName=activeGenre?(D.ragam.find(x=>x.id===activeGenre)?.label||''):'';

  /* stars */
  const renderStars=(n)=>'★'.repeat(n)+'☆'.repeat(5-n);

  return(
    <div className="app">
      <div className="topbar">
        <div className="topbar-left">
          <h1>GAWE UKORO</h1>
          <p>MUSIC PROMPT BUILDER</p>
        </div>
        <div className="topbar-right">
          <button className={`mode-btn ${mode==='vocal'?'active':''}`} onClick={()=>setMode('vocal')}>🎤</button>
          <button className={`mode-btn ${mode==='instrumental'?'active':''}`} onClick={()=>setMode('instrumental')}>🎹</button>
          <div className={`curated-toggle ${curatedOn?'on':''}`}
            onClick={()=>{setCuratedOn(p=>!p);showToast(curatedOn?'Curated OFF':'Curated ON','info');}}>
            {curatedOn?'✦':'○'} Curated
          </div>
        </div>
      </div>

      <div className="body">
        {/* PANEL KIRI */}
        <div className="left">
          <div className="tab-bar">
            <div className={`tab ${leftTab==='style'?'active':''}`} onClick={()=>setLeftTab('style')}>🎸 Style</div>
            <div className={`tab ${leftTab==='struct'?'active':''}`} onClick={()=>setLeftTab('struct')}>🏗️ Structure</div>
          </div>
          <div className="tab-content">

            {leftTab==='style'&&<>
              {/* EMPTY STATE */}
              {isEmpty&&(
                <div className="empty-state">
                  <div className="empty-title">Mulai dari Template</div>
                  <div className="empty-sub">Pilih template racik untuk memulai lebih cepat,<br/>atau pilih tag secara manual di bawah.</div>
                  <button className="btn-template-big" onClick={()=>{loadTemplates();setTplModal(true);}}>
                    ⚡ Load Template Racik
                  </button>
                </div>
              )}
              {curatedOn&&activeGenre&&compat&&(
                <div className="curated-bar">
                  <strong>✦ Curated: {curatedGenreName}</strong><br/>
                  ✓ dicentang otomatis · ⚠️ kurang cocok · tersembunyi = tidak kompatibel
                </div>
              )}
              <CuratedSection title="Genre / Ragam" cat="ragam" color="c-genre" D={D} sel={sel} toggle={toggle} grouped curatedOn={false} compat={null}/>
              <CuratedSection title="Mood / Rasa" cat="rasa" color="c-mood" D={D} sel={sel} toggle={toggle} curatedOn={curatedOn} compat={compat}/>
              {mode==='vocal'&&<CuratedSection title="Vokal / Swara" cat="swara" color="c-vocal" D={D} sel={sel} toggle={toggle} curatedOn={curatedOn} compat={compat}/>}
              <CuratedSection title="Tempo / Wirama" cat="wirama" color="c-tempo" D={D} sel={sel} toggle={toggle} curatedOn={false} compat={null}/>
              <CuratedSection title="Tangga Nada / Scale" cat="tangga_nada" color="c-scale" D={D} sel={sel} toggle={toggle} grouped curatedOn={false} compat={null}/>
              <CuratedSection title="Instrumen / Piranti" cat="piranti" color="c-instr" D={D} sel={sel} toggle={toggle} grouped curatedOn={curatedOn} compat={compat}/>
              <CuratedSection title="Produksi" cat="produksi" color="c-prod" D={D} sel={sel} toggle={toggle} curatedOn={curatedOn} compat={compat}/>
            </>}

            {leftTab==='struct'&&<>
              <div className="lib-title">Library — tap untuk tambah</div>
              <div className="lib-chips">
                {D.struktur_lagu.map(sec=>(
                  <div key={sec.id} className="lib-chip" onClick={()=>addSection(sec)}>{sec.label}</div>
                ))}
              </div>

              {/* INTENSITY CURVE */}
              {timeline.length>0&&(
                <div className="intensity-curve">
                  <div className="intensity-title">
                    <span>Intensity Curve</span>
                    <span style={{color:'#333'}}>1=rendah 5=puncak</span>
                  </div>
                  <div className="intensity-bars">
                    {timeline.map((item,i)=>{
                      const lvl=item.energy_level||3;
                      const barH=(lvl/5)*100;
                      const col=ENERGY_COLORS[lvl]||'#4338ca';
                      return(
                        <div key={item.uid} className="intensity-bar-wrap">
                          <div className="intensity-bar" style={{height:`${barH}%`,background:col,opacity:0.85}}/>
                          <div className="intensity-label">{item.label.split(' ')[0]}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* DURATION COUNTER */}
              <div className="dur-counter">
                <div className="dur-counter-top">
                  <span className="dur-counter-label">Total Durasi ({timeline.length} section)</span>
                  <span className={`dur-counter-val ${durClass}`}>
                    {toMMSS(totalDur)} / 3:00{totalDur>MAX_DUR&&' ⚠️'}
                  </span>
                </div>
                <div className="dur-bar-bg">
                  <div className="dur-bar-fill" style={{width:`${durPct}%`,background:durColor}}/>
                </div>
              </div>

              {timeline.length===0&&<div style={{color:'#333',fontSize:'0.75rem',padding:'16px 0'}}>Tap section di atas untuk mulai.</div>}
              <div className="timeline">
                {timeline.map((item,idx)=>{
                  let cursor=0;
                  for(let i=0;i<idx;i++)cursor+=timeline[i].durasi;
                  const locked=getLockedSubs(item.activeSub,conflictRules);
                  const conflicts=getConflictMsgs(item.activeSub,item.secId,conflictRules);
                  const durOk=item.durasi>=item.durasi_min&&item.durasi<=item.durasi_max;
                  const lokalSubIds=['sub_kendang_in','sub_gamelan_full','sub_gong_resonance','sub_gong_hit','sub_senggakan','sub_kecak','sub_kendang_solo'];
                  const visibleSubs=(item.sub_tersedia||[]).filter(sid=>!((!hasLokal)&&lokalSubIds.includes(sid)));
                  const lvl=item.energy_level||3;
                  return(
                    <div key={item.uid} className={`tl-item ${conflicts.length>0?'tl-warn':''}`}>
                      <div className="tl-header">
                        <span className="tl-name">{item.label}</span>
                        <span className="tl-time">{toMMSS(cursor)}</span>
                        <span className={`tl-dur-badge ${durOk?'ok':'warn'}`}>{item.durasi}s</span>
                        <div className="tl-energy">
                          {[1,2,3,4,5].map(n=>(
                            <div key={n} className={`tl-energy-dot ${n<=lvl?'on':''}`}
                              style={n<=lvl?{background:ENERGY_COLORS[lvl]}:{}}/>
                          ))}
                        </div>
                        <div className="tl-btns">
                          <button className="tl-btn" onClick={()=>moveItem(idx,-1)}>▲</button>
                          <button className="tl-btn" onClick={()=>moveItem(idx,1)}>▼</button>
                          <button className="tl-btn del" onClick={()=>delItem(item.uid)}>✕</button>
                        </div>
                      </div>
                      <div className="tl-body">
                        {!durOk&&<div className="dur-warning">⚠️ {item.durasi_warning}</div>}
                        <div className="dur-row">
                          <span className="dur-label">Durasi:</span>
                          {(item.durasi_pilihan||[10,15,20,30]).map(d=>(
                            <button key={d} className={`dur-btn ${item.durasi===d?'on':''}`} onClick={()=>setDurasi(item.uid,d)}>{d}s</button>
                          ))}
                        </div>
                        <div className="energy-row">
                          <span className="energy-label">Energi:</span>
                          {[1,2,3,4,5].map(n=>(
                            <button key={n} className={`energy-btn ${lvl===n?'on':''}`}
                              style={lvl===n?{background:ENERGY_COLORS[n],borderColor:ENERGY_COLORS[n],color:'#fff'}:{}}
                              onClick={()=>setEnergyLevel(item.uid,n)}>{n}</button>
                          ))}
                        </div>
                        <div className="sub-chips">
                          {visibleSubs.map(sid=>{
                            const s=subMap[sid];if(!s)return null;
                            const isOn=item.activeSub.includes(sid);
                            const isLocked=locked.has(sid);
                            const flagCls=s.flag==='warn'?'flag-warn':s.flag==='red'?'flag-red':'';
                            return(
                              <div key={sid}
                                className={`sub-chip ${isOn?'on':''} ${flagCls} ${isLocked?'locked':''}`}
                                onClick={()=>toggleSub(item.uid,sid,subMap,conflictRules)}
                                title={s.warn_msg||s.tag}>
                                {s.tag}
                              </div>
                            );
                          })}
                        </div>
                        {conflicts.map((msg,i)=>(
                          <div key={i} className="conflict-msg">⚠️ {msg}</div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            </>}
          </div>
        </div>

        {/* PANEL KANAN */}
        <div className="right">
          <div className="out-tabs">
            <div className={`out-tab ${outTab==='output'?'active':''}`} onClick={()=>setOutTab('output')}>Output</div>
            <div className={`out-tab ${outTab==='presets'?'active':''}`} onClick={()=>setOutTab('presets')}>
              Preset{presets.length>0?` (${presets.length})`:' '}
            </div>
          </div>
          <div className="out-body">
            {outTab==='output'&&<>
              {!styleText&&!structText
                ?<div className="out-empty">Pilih tag di panel kiri.<br/><br/>🎸 Style → style prompt<br/>🏗️ Structure → struktur lagu</div>
                :<>
                  {styleText&&<><div className="out-title">Style Prompt</div><div className="out-text">{styleText}</div><div style={{height:14}}/></>}
                  {structText&&<><div className="out-title">Structure</div><div className="out-text">{structText}</div></>}
                </>
              }
            </>}

            {outTab==='presets'&&<>
              <div style={{display:'flex',gap:'8px',marginBottom:'14px'}}>
                <button onClick={()=>setPresetTab('saya')} style={{flex:1,padding:'8px',borderRadius:'8px',border:'none',fontSize:'0.72rem',cursor:'pointer',fontWeight:600,background:presetTab==='saya'?'#4338ca':'#1a1a1a',color:presetTab==='saya'?'#fff':'#666'}}>🎛️ Preset Saya</button>
                <button onClick={()=>{setPresetTab('referensi');if(referensi.length===0)loadReferensi();}} style={{flex:1,padding:'8px',borderRadius:'8px',border:'none',fontSize:'0.72rem',cursor:'pointer',fontWeight:600,background:presetTab==='referensi'?'#1e3a5f':'#1a1a1a',color:presetTab==='referensi'?'#93c5fd':'#666'}}>🎸 Referensi</button>
              </div>

              {presetTab==='saya'&&<>
                {presets.length===0
                  ?<div className="preset-empty">Belum ada preset.<br/>Buat prompt lalu tap 💾 Simpan.</div>
                  :<div className="preset-list">
                    {presets.map(p=>(
                      <div key={p.id} className="preset-item">
                        <div className="preset-info" onClick={()=>loadPreset(p)}>
                          <div className="preset-name">{p.nama}</div>
                          <div className="preset-cat">{p.kategori} · {p.dibuat}</div>
                        </div>
                        <div className="preset-actions">
                          <button className="preset-btn load" onClick={()=>loadPreset(p)}>Load</button>
                          <button className="preset-btn exp" onClick={()=>setExportModal({title:p.nama,text:buildExportText(p)})}>Exp</button>
                          <button className="preset-btn del" onClick={()=>delPreset(p.id,p.nama)}>✕</button>
                        </div>
                      </div>
                    ))}
                    <button onClick={exportAll} style={{marginTop:8,padding:'10px',background:'#1a1a1a',border:'1px solid #333',borderRadius:'8px',color:'#a78bfa',fontSize:'0.75rem',cursor:'pointer',fontWeight:600,width:'100%'}}>📦 Export Semua</button>
                  </div>
                }
              </>}

              {presetTab==='referensi'&&<>
                {refLoading?<div className="ref-loading">Memuat...</div>:<>
                  <div className="ref-filter">
                    {refCategories.map(c=><button key={c} className={`ref-filter-btn ${refFilter===c?'on':''}`} onClick={()=>setRefFilter(c)}>{c}</button>)}
                  </div>
                  {filteredRef.length===0
                    ?<div className="preset-empty">Belum ada preset referensi.</div>
                    :<div className="ref-list">
                      {filteredRef.map(r=>{
                        const isOpen=expandedRef===r.id;
                        const struct=buildRefStruct(r.struktur);
                        return(
                          <div key={r.id} className="ref-item">
                            <div className="ref-header" onClick={()=>setExpandedRef(isOpen?null:r.id)}>
                              <div className="ref-name">{r.nama_preset}</div>
                              <div className="ref-sub">{r.inspirasi_lagu?`${r.inspirasi_lagu} — `:''}  {r.artis||''} · {r.genre_label} · {r.bpm} {isOpen?'▲':'▼'}</div>
                            </div>
                            {isOpen&&<div className="ref-body">
                              <div className="ref-meta">
                                <div><span>Vibe:</span> {r.vibe}</div>
                                <div><span>Vocal:</span> {r.vocal_style}</div>
                                <div><span>Target:</span> {r.target}</div>
                                {r.karakteristik&&<div style={{marginTop:6,color:'#666',fontSize:'0.65rem',lineHeight:1.7}}>{r.karakteristik}</div>}
                              </div>
                              <div className="out-title">Sound Prompt</div>
                              <div className="ref-prompt">{r.sound_prompt}</div>
                              <div className="out-title">Structure</div>
                              <div className="ref-struct">{struct}</div>
                              <div className="ref-btns">
                                <button className="ref-btn cp" onClick={()=>copyText(r.sound_prompt,'Sound Prompt')}>📋 Copy Prompt</button>
                                <button className="ref-btn cs" onClick={()=>copyText(struct,'Structure')}>📋 Copy Struct</button>
                              </div>
                            </div>}
                          </div>
                        );
                      })}
                    </div>
                  }
                </>}
              </>}
            </>}
          </div>

          <div className="action-bar">
            <button className="act-btn btn-style" onClick={()=>copyText(styleText,'Style Prompt')} disabled={!styleText}>📋 Style</button>
            <button className="act-btn btn-struct" onClick={()=>copyText(structText,'Structure')} disabled={!structText}>📋 Struct</button>
            <button className="act-btn btn-save" onClick={()=>{if(!styleText&&!structText){showToast('Buat prompt dulu','error');return;}setSaveModal(true);}} disabled={!styleText&&!structText}>💾 Simpan</button>
            <button className="act-btn btn-reset" onClick={()=>{setSel({ragam:[],rasa:[],swara:[],wirama:[],piranti:[],produksi:[],tangga_nada:[]});setTimeline([]);showToast('Reset','info');}}>↺</button>
          </div>
        </div>
      </div>

      {/* SAVE MODAL */}
      {saveModal&&(
        <div className="overlay" onClick={()=>setSaveModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <h3>💾 Simpan Preset</h3>
            <input placeholder="Nama preset..." value={saveName} onChange={e=>setSaveName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doSave()} autoFocus/>
            <select value={saveCat} onChange={e=>setSaveCat(e.target.value)}>
              {D.kategori_preset.map(k=><option key={k} value={k}>{k}</option>)}
            </select>
            <div className="modal-btns">
              <button className="act-btn btn-ok" onClick={doSave}>✓ Simpan</button>
              <button className="act-btn btn-reset" onClick={()=>setSaveModal(false)}>Batal</button>
            </div>
          </div>
        </div>
      )}

      {/* EXPORT MODAL */}
      {exportModal&&(
        <div className="overlay" onClick={()=>setExportModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <h3>📤 {exportModal.title}</h3>
            <div className="export-box">{exportModal.text}</div>
            <div className="modal-btns">
              <button className="act-btn btn-style" onClick={()=>{copyText(exportModal.text,'Preset');setExportModal(null);}}>📋 Copy</button>
              <button className="act-btn btn-reset" onClick={()=>setExportModal(null)}>Tutup</button>
            </div>
          </div>
        </div>
      )}

      {/* TEMPLATE MODAL */}
      {tplModal&&(
        <div className="overlay" onClick={()=>setTplModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:480}}>
            <h3>⚡ Pilih Template Racik</h3>
            {tplLoading?<div className="ref-loading">Memuat template...</div>:<>
              <div className="tpl-filter">
                {tplCategories.map(c=>(
                  <button key={c} className={`tpl-filter-btn ${tplFilter===c?'on':''}`} onClick={()=>setTplFilter(c)}>{c}</button>
                ))}
              </div>
              <div className="tpl-list">
                {filteredTpl.map(t=>(
                  <div key={t.id} className="tpl-item" onClick={()=>applyTemplate(t)}>
                    <div className="tpl-name">{t.nama}</div>
                    <div className="tpl-desc">{t.deskripsi}</div>
                    <div className="tpl-meta">
                      <span className="tpl-genre">{t.genre_utama}</span>
                      <span className="tpl-stars">{renderStars(t.nilai_jual||3)}</span>
                      <span className={`tpl-reach ${t.jangkauan||'global'}`}>{t.jangkauan||'global'}</span>
                    </div>
                  </div>
                ))}
              </div>
            </>}
            <div style={{marginTop:12}}>
              <button className="act-btn btn-reset" style={{width:'100%'}} onClick={()=>setTplModal(false)}>Tutup</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function CuratedSection({title,cat,color,D,sel,toggle,grouped,curatedOn,compat}){
  const items=D[cat]||[];
  const groups=grouped?[...new Set(items.map(x=>x.grup).filter(Boolean))]:[];
  const renderChip=(item)=>{
    const isOn=(sel[cat]||[]).includes(item.id);
    let state='normal';
    if(curatedOn&&compat){
      if(compat[`hide_${cat}`]?.includes(item.id))state='hide';
      else if(compat[`auto_${cat}`]?.includes(item.id))state='auto';
      else if(compat[`warn_${cat}`]?.includes(item.id))state='warn';
    }
    if(state==='hide')return null;
    return(
      <div key={item.id}
        className={['chip',color,isOn?'on':'',state==='auto'&&isOn?'auto-on':'',state==='warn'?'warn':''].filter(Boolean).join(' ')}
        onClick={()=>toggle(cat,item.id)}
        title={item.desc||''}>
        {item.label}
      </div>
    );
  };
  return(
    <div className="sec">
      <div className="sec-title">{title}</div>
      <div className="chips">
        {grouped&&groups.length>0
          ?groups.map(g=>(
            <React.Fragment key={g}>
              <div className="grup-label">{g}</div>
              {items.filter(x=>x.grup===g).map(renderChip)}
            </React.Fragment>
          ))
          :items.map(renderChip)
        }
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
