<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Gawe Ukoro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d0d0d;color:#e0e0e0;font-family:system-ui,sans-serif;min-height:100vh;font-size:15px;}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.topbar{background:#12122a;padding:8px 14px;border-bottom:1px solid #2a2a4a;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px;}
.topbar-left h1{font-size:1rem;color:#a78bfa;letter-spacing:3px;font-weight:700;}
.topbar-left p{font-size:0.6rem;color:#555;letter-spacing:1px;}
.topbar-right{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.mode-btn{padding:5px 12px;border-radius:20px;border:1px solid #333;background:#1a1a1a;color:#777;font-size:0.68rem;cursor:pointer;}
.mode-btn.active{background:#4f46e5;color:#fff;border-color:#4f46e5;}
.curated-toggle{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:1px solid #333;background:#1a1a1a;cursor:pointer;font-size:0.65rem;color:#777;}
.curated-toggle.on{border-color:#f59e0b;color:#f59e0b;background:#1a1500;}
.body{display:flex;flex:1;overflow:hidden;}
.left{width:52%;overflow-y:auto;border-right:1px solid #1e1e1e;}
.tab-bar{display:flex;background:#111;border-bottom:1px solid #1e1e1e;position:sticky;top:0;z-index:10;}
.tab{flex:1;padding:10px 0;text-align:center;font-size:0.68rem;color:#555;cursor:pointer;border-bottom:2px solid transparent;}
.tab.active{color:#a78bfa;border-bottom-color:#a78bfa;}
.tab-content{padding:14px;}
.sec{margin-bottom:18px;}
.sec-title{font-size:0.65rem;color:#555;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.chips{display:flex;flex-wrap:wrap;gap:5px;}
/* CHIP STATES */
.chip{padding:7px 13px;border-radius:14px;border:1px solid #2a2a2a;background:#181818;color:#999;font-size:0.73rem;cursor:pointer;transition:all 0.15s;user-select:none;-webkit-user-select:none;position:relative;}
.chip.on{color:#fff;border-color:transparent;}
.chip.on.c-genre{background:#4338ca;}
.chip.on.c-mood{background:#b91c1c;}
.chip.on.c-vocal{background:#047857;}
.chip.on.c-tempo{background:#b45309;}
.chip.on.c-instr{background:#6d28d9;}
.chip.on.c-prod{background:#0e7490;}
/* curated states */
.chip.auto-on{border-color:#f59e0b !important;box-shadow:0 0 0 1px #f59e0b;}
.chip.warn{opacity:0.55;border-color:#b45309;}
.chip.warn::after{content:'⚠';font-size:0.55rem;position:absolute;top:-4px;right:-4px;background:#b45309;border-radius:50%;width:14px;height:14px;display:flex;align-items:center;justify-content:center;color:#fff;}
.chip.hidden-chip{display:none;}
.chip.c-genre.auto-on.on{background:#4338ca;}
.grup-label{width:100%;font-size:0.62rem;color:#444;margin-top:6px;margin-bottom:2px;}
/* curated info bar */
.curated-bar{background:#1a1500;border:1px solid #f59e0b33;border-radius:8px;padding:8px 10px;margin-bottom:12px;font-size:0.65rem;color:#a07020;line-height:1.6;}
.curated-bar strong{color:#f59e0b;}
/* structure */
.lib-title{font-size:0.65rem;color:#555;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.lib-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px;}
.lib-chip{padding:7px 13px;border-radius:14px;border:1px solid #2a2a2a;background:#181818;color:#888;font-size:0.73rem;cursor:pointer;}
.lib-chip:active{background:#252525;}
.timeline{display:flex;flex-direction:column;gap:6px;}
.tl-item{background:#161616;border:1px solid #252525;border-radius:10px;overflow:hidden;}
.tl-header{display:flex;align-items:center;padding:8px 10px;gap:8px;background:#1a1a2e;}
.tl-name{font-size:0.78rem;color:#a78bfa;font-weight:600;flex:1;}
.tl-time{font-size:0.68rem;color:#555;margin-right:4px;}
.tl-btns{display:flex;gap:4px;}
.tl-btn{width:28px;height:28px;border-radius:6px;border:1px solid #2a2a2a;background:#111;color:#666;font-size:0.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.tl-btn.del{color:#ef4444;}
.tl-body{padding:8px 10px;}
.dur-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
.dur-label{font-size:0.65rem;color:#555;}
.dur-btn{padding:4px 10px;border-radius:8px;border:1px solid #2a2a2a;background:#111;color:#777;font-size:0.68rem;cursor:pointer;}
.dur-btn.on{background:#4338ca;color:#fff;border-color:#4338ca;}
.sub-chips{display:flex;flex-wrap:wrap;gap:4px;}
.sub-chip{padding:4px 9px;border-radius:10px;border:1px solid #2a2a2a;background:#111;color:#666;font-size:0.67rem;cursor:pointer;}
.sub-chip.on{background:#1e3a5f;color:#93c5fd;border-color:#1e3a5f;}
/* right panel */
.right{width:48%;display:flex;flex-direction:column;overflow:hidden;}
.out-tabs{display:flex;background:#111;border-bottom:1px solid #1e1e1e;}
.out-tab{flex:1;padding:9px 0;text-align:center;font-size:0.68rem;color:#555;cursor:pointer;border-bottom:2px solid transparent;}
.out-tab.active{color:#a78bfa;border-bottom-color:#a78bfa;}
.out-body{flex:1;overflow-y:auto;padding:14px;}
.out-title{font-size:0.68rem;color:#555;margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;}
.out-text{font-size:0.75rem;line-height:1.8;color:#ccc;white-space:pre-wrap;font-family:'Courier New',monospace;background:#111;border:1px solid #1e1e1e;border-radius:8px;padding:12px;}
.out-empty{color:#333;font-size:0.78rem;text-align:center;padding:40px 20px;line-height:2;}
.action-bar{padding:10px 12px;border-top:1px solid #1e1e1e;display:flex;gap:6px;flex-shrink:0;}
.act-btn{flex:1;padding:10px 6px;border-radius:8px;border:none;font-size:0.72rem;cursor:pointer;font-weight:600;transition:all 0.2s;}
.act-btn:disabled{opacity:0.35;cursor:not-allowed;}
.btn-style{background:#4338ca;color:#fff;}
.btn-struct{background:#047857;color:#fff;}
.btn-save{background:#b45309;color:#fff;}
.btn-reset{background:#1a1a1a;color:#666;border:1px solid #252525;}
.btn-ok{background:#059669;color:#fff;}
/* preset */
.preset-list{display:flex;flex-direction:column;gap:8px;}
.preset-item{background:#161616;border:1px solid #252525;border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:8px;}
.preset-info{flex:1;cursor:pointer;min-width:0;}
.preset-name{font-size:0.78rem;color:#e0e0e0;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.preset-cat{font-size:0.63rem;color:#555;margin-top:2px;}
.preset-actions{display:flex;gap:4px;flex-shrink:0;}
.preset-btn{padding:5px 8px;background:none;border:1px solid #2a2a2a;border-radius:6px;font-size:0.65rem;cursor:pointer;}
.preset-btn.load{color:#a78bfa;}
.preset-btn.exp{color:#4ade80;}
.preset-btn.del{color:#ef4444;}
.preset-empty{color:#333;font-size:0.78rem;text-align:center;padding:40px 20px;line-height:2;}
/* referensi */
.ref-filter{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.ref-filter-btn{padding:5px 12px;border-radius:14px;border:1px solid #2a2a2a;background:#181818;color:#777;font-size:0.68rem;cursor:pointer;}
.ref-filter-btn.on{background:#4338ca;color:#fff;border-color:#4338ca;}
.ref-list{display:flex;flex-direction:column;gap:8px;}
.ref-item{background:#161616;border:1px solid #1e3a5f;border-radius:10px;overflow:hidden;}
.ref-header{padding:10px 12px;cursor:pointer;}
.ref-name{font-size:0.82rem;color:#93c5fd;font-weight:700;}
.ref-sub{font-size:0.65rem;color:#555;margin-top:2px;}
.ref-body{padding:10px 12px;border-top:1px solid #1e3a5f;background:#0d1a2e;}
.ref-meta{font-size:0.68rem;color:#666;margin-bottom:8px;line-height:1.8;}
.ref-meta span{color:#93c5fd;}
.ref-prompt{font-size:0.7rem;color:#aaa;background:#111;border:1px solid #1e1e1e;border-radius:6px;padding:8px;margin-bottom:8px;line-height:1.6;font-family:monospace;}
.ref-struct{font-size:0.68rem;color:#888;white-space:pre-wrap;font-family:monospace;background:#111;border:1px solid #1e1e1e;border-radius:6px;padding:8px;max-height:180px;overflow-y:auto;margin-bottom:8px;}
.ref-btns{display:flex;gap:6px;}
.ref-btn{flex:1;padding:8px;border-radius:8px;border:none;font-size:0.7rem;cursor:pointer;font-weight:600;}
.ref-btn.cp{background:#4338ca;color:#fff;}
.ref-btn.cs{background:#047857;color:#fff;}
.ref-loading{color:#444;font-size:0.75rem;text-align:center;padding:30px;}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#161616;border:1px solid #2a2a2a;border-radius:14px;padding:20px;width:100%;max-width:420px;}
.modal h3{font-size:0.9rem;color:#a78bfa;margin-bottom:16px;}
.modal input{width:100%;background:#111;border:1px solid #2a2a2a;border-radius:8px;color:#e0e0e0;padding:10px 12px;font-size:0.82rem;margin-bottom:12px;outline:none;}
.modal input:focus{border-color:#4f46e5;}
.modal select{width:100%;background:#111;border:1px solid #2a2a2a;border-radius:8px;color:#e0e0e0;padding:10px 12px;font-size:0.82rem;margin-bottom:16px;outline:none;}
.modal-btns{display:flex;gap:8px;}
.export-box{background:#111;border:1px solid #1e1e1e;border-radius:8px;padding:12px;font-size:0.7rem;color:#aaa;font-family:monospace;white-space:pre-wrap;max-height:240px;overflow-y:auto;margin-bottom:12px;line-height:1.6;}
/* toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e1e1e;border:1px solid #333;color:#e0e0e0;padding:10px 20px;border-radius:20px;font-size:0.78rem;opacity:0;transition:all 0.3s;z-index:200;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.success{border-color:#059669;color:#4ade80;}
.toast.error{border-color:#dc2626;color:#f87171;}
.toast.info{border-color:#4f46e5;color:#a78bfa;}
@media(max-width:680px){
  .body{flex-direction:column;}
  .left{width:100%;height:55vh;border-right:none;border-bottom:1px solid #1e1e1e;}
  .right{width:100%;height:45vh;}
}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast"></div>
<script type="text/babel">
const {useState,useEffect,useCallback}=React;

const toMMSS=s=>{const m=Math.floor(s/60);return `${m}:${String(s%60).padStart(2,'0')}`;};
const getAllSub=data=>{const m={};Object.values(data.sub_instruksi||{}).flat().forEach(x=>{m[x.id]=x;});return m;};

const showToast=(msg,type='info',dur=2500)=>{
  const el=document.getElementById('toast');if(!el)return;
  el.textContent=msg;el.className=`toast ${type} show`;
  clearTimeout(el._t);el._t=setTimeout(()=>{el.className='toast';},dur);
};

const copyText=async(text,label)=>{
  if(!text){showToast('Tidak ada konten','error');return;}
  try{
    if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(text);}
    else{
      const ta=document.createElement('textarea');ta.value=text;
      ta.style.cssText='position:fixed;left:-9999px;top:-9999px;opacity:0;';
      document.body.appendChild(ta);ta.focus();ta.select();
      const ok=document.execCommand('copy');document.body.removeChild(ta);
      if(!ok)throw new Error();
    }
    showToast(`✓ ${label} tersalin!`,'success');
  }catch(e){showToast('Gagal menyalin — coba long-press teks','error',4000);}
};

const sbFetch=async(table,params='')=>{
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`,{
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
  });
  if(!res.ok)throw new Error(`${res.status}`);
  return res.json();
};
const sbInsert=async(table,data)=>{
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'return=representation'},
    body:JSON.stringify(data)
  });
  if(!res.ok){const e=await res.text();throw new Error(e);}
  return res.json();
};
const sbDelete=async(table,id)=>{
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`,{
    method:'DELETE',
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
  });
  if(!res.ok)throw new Error(`${res.status}`);
};

/* ── curated helpers ── */
const getCompat=(D,selectedGenre)=>{
  if(!D||!selectedGenre)return null;
  return D.kompatibilitas?.[selectedGenre]||null;
};

const getChipState=(compat,curatedOn,cat,id,isSelected)=>{
  if(!curatedOn||!compat)return'normal';
  const autoKey=`auto_${cat}`;
  const warnKey=`warn_${cat}`;
  const hideKey=`hide_${cat}`;
  if(compat[hideKey]?.includes(id))return'hide';
  if(compat[autoKey]?.includes(id))return isSelected?'auto-on-selected':'auto-on';
  if(compat[warnKey]?.includes(id))return'warn';
  return'normal';
};

/* ══════════════════ APP ══════════════════ */
function App(){
  const [D,setD]=useState(null);
  const [mode,setMode]=useState('vocal');
  const [curatedOn,setCuratedOn]=useState(true);
  const [leftTab,setLeftTab]=useState('style');
  const [outTab,setOutTab]=useState('output');
  const [presetTab,setPresetTab]=useState('saya');
  const [sel,setSel]=useState({ragam:[],rasa:[],swara:[],wirama:[],piranti:[],produksi:[]});
  const [timeline,setTimeline]=useState([]);
  const [presets,setPresets]=useState([]);
  const [referensi,setReferensi]=useState([]);
  const [refFilter,setRefFilter]=useState('Semua');
  const [refLoading,setRefLoading]=useState(false);
  const [expandedRef,setExpandedRef]=useState(null);
  const [saveModal,setSaveModal]=useState(false);
  const [saveName,setSaveName]=useState('');
  const [saveCat,setSaveCat]=useState('');
  const [exportModal,setExportModal]=useState(null);

  useEffect(()=>{
    fetch('ukoro-data.json').then(r=>r.json()).then(d=>{setD(d);setSaveCat(d.kategori_preset[0]);})
      .catch(()=>showToast('Gagal memuat kamus','error'));
    sbFetch('preset_gawe_ukoro','order=created_at.desc')
      .then(data=>setPresets(Array.isArray(data)?data:[]))
      .catch(()=>showToast('Mode offline','info'));
  },[]);

  const loadReferensi=useCallback(()=>{
    setRefLoading(true);
    sbFetch('preset_referensi','aktif=eq.true&order=id.asc')
      .then(data=>{setReferensi(Array.isArray(data)?data:[]);setRefLoading(false);})
      .catch(()=>{showToast('Gagal memuat referensi','error');setRefLoading(false);});
  },[]);

  useEffect(()=>{
    if(outTab==='presets'&&presetTab==='referensi'&&referensi.length===0)loadReferensi();
  },[outTab,presetTab]);

  /* curated: saat genre dipilih, auto-centang rekomendasi */
  const handleGenreToggle=useCallback((id)=>{
    setSel(p=>{
      const arr=p.ragam;
      const isRemoving=arr.includes(id);
      const newRagam=arr.includes(id)?arr.filter(x=>x!==id):[...arr,id];
      if(!curatedOn||!D)return{...p,ragam:newRagam};
      const compat=D.kompatibilitas?.[id];
      if(!compat||isRemoving)return{...p,ragam:newRagam};
      /* auto-apply rekomendasi */
      const newSel={...p,ragam:newRagam};
      ['rasa','swara','piranti','produksi'].forEach(cat=>{
        const autoKey=`auto_${cat}`;
        const hideKey=`hide_${cat}`;
        const autoIds=compat[autoKey]||[];
        const hideIds=compat[hideKey]||[];
        const current=newSel[cat]||[];
        const filtered=current.filter(x=>!hideIds.includes(x));
        const merged=[...new Set([...filtered,...autoIds])];
        newSel[cat]=merged;
      });
      return newSel;
    });
  },[D,curatedOn]);

  const toggle=(cat,id)=>{
    if(cat==='ragam'){handleGenreToggle(id);return;}
    setSel(p=>{
      const arr=p[cat];
      if(cat==='wirama')return{...p,[cat]:arr.includes(id)?[]:[id]};
      return{...p,[cat]:arr.includes(id)?arr.filter(x=>x!==id):[...arr,id]};
    });
  };

  /* ambil genre pertama yang dipilih untuk compat */
  const activeGenre=sel.ragam[0]||null;
  const compat=getCompat(D,activeGenre);

  const buildStyle=useCallback(()=>{
    if(!D)return'';
    const find=(cat,id)=>(D[cat]||[]).find(x=>x.id===id);
    const parts=[];
    if(sel.ragam.length)parts.push(sel.ragam.map(id=>find('ragam',id)?.label).filter(Boolean).join(', '));
    if(sel.rasa.length)parts.push(sel.rasa.map(id=>find('rasa',id)?.label).filter(Boolean).join(', '));
    if(mode==='instrumental')parts.push('instrumental only, no vocals');
    else if(sel.swara.length)parts.push(sel.swara.map(id=>find('swara',id)?.label).filter(Boolean).join(', '));
    if(sel.wirama.length){const t=find('wirama',sel.wirama[0]);if(t)parts.push(t.bpm||t.label);}
    if(sel.piranti.length)parts.push(sel.piranti.map(id=>find('piranti',id)?.label).filter(Boolean).join(' + '));
    if(sel.produksi.length)parts.push(sel.produksi.map(id=>find('produksi',id)?.label).filter(Boolean).join(', '));
    return parts.join(', ');
  },[D,sel,mode]);

  const buildStruct=useCallback(()=>{
    if(!D||!timeline.length)return'';
    const subMap=getAllSub(D);
    let cursor=0;const lines=[];
    timeline.forEach(item=>{
      lines.push(`[${item.label} - ${toMMSS(cursor)}]`);
      item.activeSub.forEach(sid=>{if(subMap[sid])lines.push(subMap[sid].tag);});
      lines.push('');cursor+=item.durasi;
    });
    lines.push(`[End - ${toMMSS(cursor)}]`);
    return lines.join('\n');
  },[D,timeline]);

  const buildRefStruct=(struktur)=>{
    if(!struktur)return'';
    try{
      const arr=typeof struktur==='string'?JSON.parse(struktur):struktur;
      return arr.map(s=>{
        const lines=[`[${s.label} - ${s.timestamp}]`];
        (s.sub||[]).forEach(x=>lines.push(`[${x}]`));
        lines.push('');return lines.join('\n');
      }).join('')+'[End]';
    }catch(e){return'';}
  };

  const addSection=sec=>{
    const count=timeline.filter(x=>x.secId===sec.id).length;
    const label=count>0?`${sec.label} ${count+1}`:sec.label;
    setTimeline(p=>[...p,{uid:Date.now()+Math.random(),secId:sec.id,label,durasi:sec.durasi_default,durasi_pilihan:sec.durasi_pilihan,sub_tersedia:sec.sub_tersedia,activeSub:[...(sec.sub_default||[])]}]);
  };
  const moveItem=(idx,dir)=>setTimeline(p=>{const a=[...p];const to=idx+dir;if(to<0||to>=a.length)return a;[a[idx],a[to]]=[a[to],a[idx]];return a;});
  const delItem=uid=>setTimeline(p=>p.filter(x=>x.uid!==uid));
  const setDurasi=(uid,d)=>setTimeline(p=>p.map(x=>x.uid===uid?{...x,durasi:d}:x));
  const toggleSub=(uid,sid)=>setTimeline(p=>p.map(x=>{if(x.uid!==uid)return x;const a=x.activeSub.includes(sid)?x.activeSub.filter(s=>s!==sid):[...x.activeSub,sid];return{...x,activeSub:a};}));

  const doSave=async()=>{
    if(!saveName.trim()){showToast('Nama tidak boleh kosong','error');return;}
    const styleText=buildStyle();const structText=buildStruct();
    if(!styleText&&!structText){showToast('Tidak ada konten','error');return;}
    try{
      const data=await sbInsert('preset_gawe_ukoro',{nama:saveName.trim(),kategori:saveCat,mode,sel_data:sel,timeline,dibuat:new Date().toLocaleDateString('id-ID')});
      setPresets(p=>[data[0],...p]);setSaveModal(false);setSaveName('');
      showToast(`✓ "${saveName}" tersimpan`,'success');
      setOutTab('presets');setPresetTab('saya');
    }catch(e){showToast('Gagal simpan ke server','error');}
  };

  const loadPreset=p=>{
    const s=p.sel_data||{};
    setSel({ragam:s.ragam||[],rasa:s.rasa||[],swara:s.swara||[],wirama:s.wirama||[],piranti:s.piranti||[],produksi:s.produksi||[]});
    setTimeline(p.timeline||[]);setMode(p.mode||'vocal');
    setOutTab('output');setLeftTab('style');
    showToast(`"${p.nama}" dimuat`,'info');
  };

  const delPreset=async(id,nama)=>{
    try{await sbDelete('preset_gawe_ukoro',id);setPresets(p=>p.filter(x=>x.id!==id));showToast(`"${nama}" dihapus`,'info');}
    catch(e){showToast('Gagal hapus','error');}
  };

  const buildExportText=(p)=>{
    if(!D)return'';
    const find=(cat,id)=>(D[cat]||[]).find(x=>x.id===id);
    const s=p.sel_data||{};const parts=[];
    if(s.ragam?.length)parts.push(s.ragam.map(id=>find('ragam',id)?.label).filter(Boolean).join(', '));
    if(s.rasa?.length)parts.push(s.rasa.map(id=>find('rasa',id)?.label).filter(Boolean).join(', '));
    if(p.mode==='instrumental')parts.push('instrumental only, no vocals');
    else if(s.swara?.length)parts.push(s.swara.map(id=>find('swara',id)?.label).filter(Boolean).join(', '));
    if(s.wirama?.length){const t=find('wirama',s.wirama[0]);if(t)parts.push(t.bpm||t.label);}
    if(s.piranti?.length)parts.push(s.piranti.map(id=>find('piranti',id)?.label).filter(Boolean).join(' + '));
    if(s.produksi?.length)parts.push(s.produksi.map(id=>find('produksi',id)?.label).filter(Boolean).join(', '));
    const style=parts.join(', ');const subMap=getAllSub(D);let cursor=0;const lines=[];
    (p.timeline||[]).forEach(item=>{lines.push(`[${item.label} - ${toMMSS(cursor)}]`);item.activeSub?.forEach(sid=>{if(subMap[sid])lines.push(subMap[sid].tag);});lines.push('');cursor+=item.durasi;});
    if(lines.length)lines.push(`[End - ${toMMSS(cursor)}]`);
    return`PRESET: ${p.nama}\nKATEGORI: ${p.kategori}\nTANGGAL: ${p.dibuat}\n\n[STYLE PROMPT]\n${style}\n\n[STRUCTURE]\n${lines.join('\n')}`;
  };

  const exportAll=()=>{
    if(!presets.length){showToast('Tidak ada preset','error');return;}
    const lines=presets.map((p,i)=>`${'='.repeat(50)}\nPRESET #${String(i+1).padStart(2,'0')}\n${'='.repeat(50)}\n${buildExportText(p)}`).join('\n\n');
    try{const blob=new Blob([lines],{type:'text/plain'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='ukoro-bundle.txt';a.click();URL.revokeObjectURL(url);showToast(`✓ ${presets.length} preset diekspor`,'success');}
    catch(e){showToast('Gagal ekspor','error');}
  };

  const refCategories=['Semua',...[...new Set(referensi.map(r=>r.kategori_bundle).filter(Boolean))]];
  const filteredRef=refFilter==='Semua'?referensi:referensi.filter(r=>r.kategori_bundle===refFilter);
  const styleText=buildStyle();const structText=buildStruct();const hasContent=!!(styleText||structText);

  if(!D)return<div style={{color:'#555',padding:'40px',textAlign:'center',fontSize:'0.85rem'}}>Memuat data...</div>;
  const subMap=getAllSub(D);

  /* curated info */
  const curatedGenreName=activeGenre?(D.ragam.find(x=>x.id===activeGenre)?.label||''):'';

  return(
    <div className="app">
      <div className="topbar">
        <div className="topbar-left">
          <h1>GAWE UKORO</h1>
          <p>MUSIC PROMPT BUILDER</p>
        </div>
        <div className="topbar-right">
          <button className={`mode-btn ${mode==='vocal'?'active':''}`} onClick={()=>setMode('vocal')}>🎤</button>
          <button className={`mode-btn ${mode==='instrumental'?'active':''}`} onClick={()=>setMode('instrumental')}>🎹</button>
          <div className={`curated-toggle ${curatedOn?'on':''}`} onClick={()=>setCuratedOn(p=>!p)}>
            {curatedOn?'✦':'○'} Curated
          </div>
        </div>
      </div>

      <div className="body">
        <div className="left">
          <div className="tab-bar">
            <div className={`tab ${leftTab==='style'?'active':''}`} onClick={()=>setLeftTab('style')}>🎸 Style</div>
            <div className={`tab ${leftTab==='struct'?'active':''}`} onClick={()=>setLeftTab('struct')}>🏗️ Structure</div>
          </div>
          <div className="tab-content">
            {leftTab==='style'&&<>
              {curatedOn&&activeGenre&&compat&&(
                <div className="curated-bar">
                  <strong>✦ Curated: {curatedGenreName}</strong><br/>
                  Tag direkomendasikan otomatis dicentang. ⚠️ = kurang cocok. Tag tersembunyi = tidak kompatibel.
                  <br/><span style={{color:'#666'}}>Matikan Curated untuk akses penuh.</span>
                </div>
              )}
              <CuratedChipSection title="Genre / Ragam" cat="ragam" color="c-genre" data={D} sel={sel} toggle={toggle} grouped curatedOn={false} compat={null}/>
              <CuratedChipSection title="Mood / Rasa" cat="rasa" color="c-mood" data={D} sel={sel} toggle={toggle} curatedOn={curatedOn} compat={compat}/>
              {mode==='vocal'&&<CuratedChipSection title="Vokal / Swara" cat="swara" color="c-vocal" data={D} sel={sel} toggle={toggle} curatedOn={curatedOn} compat={compat}/>}
              <CuratedChipSection title="Tempo / Wirama" cat="wirama" color="c-tempo" data={D} sel={sel} toggle={toggle} curatedOn={false} compat={null}/>
              <CuratedChipSection title="Instrumen / Piranti" cat="piranti" color="c-instr" data={D} sel={sel} toggle={toggle} grouped curatedOn={curatedOn} compat={compat}/>
              <CuratedChipSection title="Produksi" cat="produksi" color="c-prod" data={D} sel={sel} toggle={toggle} curatedOn={curatedOn} compat={compat}/>
            </>}
            {leftTab==='struct'&&<>
              <div className="lib-title">Library — tap untuk tambah</div>
              <div className="lib-chips">
                {D.struktur_lagu.map(sec=>(
                  <div key={sec.id} className="lib-chip" onClick={()=>addSection(sec)}>{sec.label}</div>
                ))}
              </div>
              <div className="lib-title">Timeline {timeline.length>0&&`(${timeline.length})`}</div>
              {timeline.length===0&&<div style={{color:'#333',fontSize:'0.75rem',padding:'16px 0'}}>Tap section di atas untuk tambah.</div>}
              <div className="timeline">
                {timeline.map((item,idx)=>{
                  let cursor=0;for(let i=0;i<idx;i++)cursor+=timeline[i].durasi;
                  return(
                    <div key={item.uid} className="tl-item">
                      <div className="tl-header">
                        <span className="tl-name">{item.label}</span>
                        <span className="tl-time">{toMMSS(cursor)}</span>
                        <div className="tl-btns">
                          <button className="tl-btn" onClick={()=>moveItem(idx,-1)}>▲</button>
                          <button className="tl-btn" onClick={()=>moveItem(idx,1)}>▼</button>
                          <button className="tl-btn del" onClick={()=>delItem(item.uid)}>✕</button>
                        </div>
                      </div>
                      <div className="tl-body">
                        <div className="dur-row">
                          <span className="dur-label">Durasi:</span>
                          {item.durasi_pilihan.map(d=>(
                            <button key={d} className={`dur-btn ${item.durasi===d?'on':''}`} onClick={()=>setDurasi(item.uid,d)}>{d}s</button>
                          ))}
                        </div>
                        <div className="sub-chips">
                          {item.sub_tersedia.map(sid=>{const s=subMap[sid];if(!s)return null;return<div key={sid} className={`sub-chip ${item.activeSub.includes(sid)?'on':''}`} onClick={()=>toggleSub(item.uid,sid)}>{s.tag}</div>;})}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </>}
          </div>
        </div>

        <div className="right">
          <div className="out-tabs">
            <div className={`out-tab ${outTab==='output'?'active':''}`} onClick={()=>setOutTab('output')}>Output</div>
            <div className={`out-tab ${outTab==='presets'?'active':''}`} onClick={()=>setOutTab('presets')}>Preset{presets.length>0?` (${presets.length})`:''}</div>
          </div>
          <div className="out-body">
            {outTab==='output'&&<>
              {!hasContent
                ?<div className="out-empty">Pilih tag di panel kiri.<br/><br/>🎸 Style → style prompt<br/>🏗️ Structure → struktur lagu</div>
                :<>
                  {styleText&&<><div className="out-title">Style Prompt</div><div className="out-text">{styleText}</div><div style={{height:14}}/></>}
                  {structText&&<><div className="out-title">Structure</div><div className="out-text">{structText}</div></>}
                </>
              }
            </>}
            {outTab==='presets'&&<>
              <div style={{display:'flex',gap:'8px',marginBottom:'14px'}}>
                <button onClick={()=>setPresetTab('saya')} style={{flex:1,padding:'8px',borderRadius:'8px',border:'none',fontSize:'0.72rem',cursor:'pointer',fontWeight:600,background:presetTab==='saya'?'#4338ca':'#1a1a1a',color:presetTab==='saya'?'#fff':'#666'}}>🎛️ Preset Saya</button>
                <button onClick={()=>{setPresetTab('referensi');if(referensi.length===0)loadReferensi();}} style={{flex:1,padding:'8px',borderRadius:'8px',border:'none',fontSize:'0.72rem',cursor:'pointer',fontWeight:600,background:presetTab==='referensi'?'#1e3a5f':'#1a1a1a',color:presetTab==='referensi'?'#93c5fd':'#666'}}>🎸 Referensi</button>
              </div>
              {presetTab==='saya'&&<>
                {presets.length===0
                  ?<div className="preset-empty">Belum ada preset.<br/>Buat prompt lalu tap 💾 Simpan.</div>
                  :<div className="preset-list">
                    {presets.map(p=>(
                      <div key={p.id} className="preset-item">
                        <div className="preset-info" onClick={()=>loadPreset(p)}>
                          <div className="preset-name">{p.nama}</div>
                          <div className="preset-cat">{p.kategori} · {p.dibuat}</div>
                        </div>
                        <div className="preset-actions">
                          <button className="preset-btn load" onClick={()=>loadPreset(p)}>Load</button>
                          <button className="preset-btn exp" onClick={()=>setExportModal({title:p.nama,text:buildExportText(p)})}>Exp</button>
                          <button className="preset-btn del" onClick={()=>delPreset(p.id,p.nama)}>✕</button>
                        </div>
                      </div>
                    ))}
                    <button onClick={exportAll} style={{marginTop:8,padding:'10px',background:'#1a1a1a',border:'1px solid #333',borderRadius:'8px',color:'#a78bfa',fontSize:'0.75rem',cursor:'pointer',fontWeight:600,width:'100%'}}>📦 Export Semua</button>
                  </div>
                }
              </>}
              {presetTab==='referensi'&&<>
                {refLoading?<div className="ref-loading">Memuat...</div>:<>
                  <div className="ref-filter">
                    {refCategories.map(c=><button key={c} className={`ref-filter-btn ${refFilter===c?'on':''}`} onClick={()=>setRefFilter(c)}>{c}</button>)}
                  </div>
                  {filteredRef.length===0?<div className="preset-empty">Belum ada preset referensi.</div>
                    :<div className="ref-list">
                      {filteredRef.map(r=>{
                        const isOpen=expandedRef===r.id;
                        const struct=buildRefStruct(r.struktur);
                        return(
                          <div key={r.id} className="ref-item">
                            <div className="ref-header" onClick={()=>setExpandedRef(isOpen?null:r.id)}>
                              <div className="ref-name">{r.nama_preset}</div>
                              <div className="ref-sub">{r.inspirasi_lagu} — {r.artis} · {r.genre_label} · {r.bpm} BPM {isOpen?'▲':'▼'}</div>
                            </div>
                            {isOpen&&<div className="ref-body">
                              <div className="ref-meta">
                                <div><span>Vibe:</span> {r.vibe}</div>
                                <div><span>Vocal:</span> {r.vocal_style}</div>
                                <div><span>Target:</span> {r.target}</div>
                                {r.karakteristik&&<div style={{marginTop:6,color:'#666',fontSize:'0.65rem',lineHeight:1.7}}>{r.karakteristik}</div>}
                              </div>
                              <div className="out-title">Sound Prompt</div>
                              <div className="ref-prompt">{r.sound_prompt}</div>
                              <div className="out-title">Structure</div>
                              <div className="ref-struct">{struct}</div>
                              <div className="ref-btns">
                                <button className="ref-btn cp" onClick={()=>copyText(r.sound_prompt,'Sound Prompt')}>📋 Copy Prompt</button>
                                <button className="ref-btn cs" onClick={()=>copyText(struct,'Structure')}>📋 Copy Struct</button>
                              </div>
                            </div>}
                          </div>
                        );
                      })}
                    </div>
                  }
                </>}
              </>}
            </>}
          </div>
          <div className="action-bar">
            <button className="act-btn btn-style" onClick={()=>copyText(styleText,'Style Prompt')} disabled={!styleText}>📋 Style</button>
            <button className="act-btn btn-struct" onClick={()=>copyText(structText,'Structure')} disabled={!structText}>📋 Struct</button>
            <button className="act-btn btn-save" onClick={()=>{if(!hasContent){showToast('Buat prompt dulu','error');return;}setSaveModal(true);}} disabled={!hasContent}>💾 Simpan</button>
            <button className="act-btn btn-reset" onClick={()=>{setSel({ragam:[],rasa:[],swara:[],wirama:[],piranti:[],produksi:[]});setTimeline([]);showToast('Reset','info');}}>↺</button>
          </div>
        </div>
      </div>

      {saveModal&&(
        <div className="overlay" onClick={()=>setSaveModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <h3>💾 Simpan Preset</h3>
            <input placeholder="Nama preset..." value={saveName} onChange={e=>setSaveName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doSave()} autoFocus/>
            <select value={saveCat} onChange={e=>setSaveCat(e.target.value)}>
              {D.kategori_preset.map(k=><option key={k} value={k}>{k}</option>)}
            </select>
            <div className="modal-btns">
              <button className="act-btn btn-ok" onClick={doSave}>✓ Simpan</button>
              <button className="act-btn btn-reset" onClick={()=>setSaveModal(false)}>Batal</button>
            </div>
          </div>
        </div>
      )}
      {exportModal&&(
        <div className="overlay" onClick={()=>setExportModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <h3>📤 {exportModal.title}</h3>
            <div className="export-box">{exportModal.text}</div>
            <div className="modal-btns">
              <button className="act-btn btn-style" onClick={()=>{copyText(exportModal.text,'Preset');setExportModal(null);}}>📋 Copy</button>
              <button className="act-btn btn-reset" onClick={()=>setExportModal(null)}>Tutup</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══ CuratedChipSection ══ */
function CuratedChipSection({title,cat,color,data,sel,toggle,grouped,curatedOn,compat}){
  const items=data[cat]||[];
  const groups=grouped?[...new Set(items.map(x=>x.grup).filter(Boolean))]:[];

  const renderChip=(item)=>{
    const isSelected=sel[cat].includes(item.id);
    let state='normal';
    if(curatedOn&&compat){
      const autoKey=`auto_${cat}`;
      const warnKey=`warn_${cat}`;
      const hideKey=`hide_${cat}`;
      if(compat[hideKey]?.includes(item.id))state='hide';
      else if(compat[autoKey]?.includes(item.id))state='auto';
      else if(compat[warnKey]?.includes(item.id))state='warn';
    }
    if(state==='hide')return null;
    const cls=[
      'chip',color,
      isSelected?'on':'',
      state==='auto'&&isSelected?'auto-on':'',
      state==='warn'?'warn':''
    ].filter(Boolean).join(' ');
    return(
      <div key={item.id} className={cls} onClick={()=>toggle(cat,item.id)}>
        {item.label}
      </div>
    );
  };

  return(
    <div className="sec">
      <div className="sec-title">{title}</div>
      <div className="chips">
        {grouped&&groups.length>0
          ?groups.map(g=>(
            <React.Fragment key={g}>
              <div className="grup-label">{g}</div>
              {items.filter(x=>x.grup===g).map(renderChip)}
            </React.Fragment>
          ))
          :items.map(renderChip)
        }
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
